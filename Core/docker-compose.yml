  tts:
    # Optional voice service: only start when explicitly requested via --profile voice.
    profiles:
      - voice
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: tts-runtime
    working_dir: /app
    entrypoint: ["python"]
    environment:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      PYTHONPATH: /app
      HF_HOME: /root/.cache/huggingface
      # Allow online downloads by default; set to 1 after running hf-prefetch for air-gapped use.
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-0}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-0}"
      CODEXIFY_TTS_SERVICE_PROVIDER: "${CODEXIFY_TTS_SERVICE_PROVIDER:-qwen3_0.6b}"
      CODEXIFY_TTS_PRELOAD_ON_STARTUP: "${CODEXIFY_TTS_PRELOAD_ON_STARTUP:-1}"
    volumes:
      - ./backend:/app/backend
      - hf_cache:/root/.cache/huggingface
    ports: ["8000:8000"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json
          import urllib.request
          with urllib.request.urlopen("http://localhost:8000/health", timeout=2) as response:
              payload = json.load(response)
          raise SystemExit(0 if payload.get("ready") else 1)
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 15s
    restart: unless-stopped
    command: ["/app/backend/scripts/docker/run_tts.py"]
  frontend:
    # NOTE: We run the dev UI using an official Node image so we always have /bin/sh.
    # This avoids breakage if the local ./frontend Dockerfile was refactored into a distroless image.
    image: node:20-alpine
    pull_policy: always
    working_dir: /app
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/src/node_modules
      - corepack_cache:/root/.cache/node/corepack
      - frontend_pnpm_store:/pnpm/store
    env_file: ${CODEXIFY_RUNTIME_ENV_FILE:-.env}
    # Do not start the dev UI until the core API is actually reachable.
    # This avoids proxy storms against the in-network hostname `backend` during boot.
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: http://backend:8888
      # Dev-only: frontend receives API key for local development.
      # DO NOT use this pattern for production deployments.
      VITE_GUARDIAN_API_KEY: "${GUARDIAN_API_KEY:-}"
      VITE_DEFAULT_LLM_PROVIDER: "local"
      VITE_DEFAULT_EMBED_PROVIDER: "local"
      PNPM_CONFIG_IGNORE_SCRIPTS: "true"
      CI: "true"
      CHOKIDAR_USEPOLLING: "true"
      PNPM_HOME: /pnpm
      PNPM_STORE_DIR: /pnpm/store
    entrypoint: ["sh", "-lc"]
    command:
      - |
        set -e
        echo "[Frontend] Enabling pnpm via corepack..."
        corepack enable
        if [ ! -x /root/.cache/node/corepack/v1/pnpm/9.12.1/bin/pnpm.cjs ]; then
          echo "[Frontend] Downloading pnpm@9.12.1 into persistent Corepack cache..."
          corepack prepare pnpm@9.12.1 --activate
        else
          echo "[Frontend] Reusing cached pnpm@9.12.1 from Corepack cache..."
          corepack prepare pnpm@9.12.1 --activate
        fi

        echo "[Frontend] Installing root deps..."
        pnpm install --frozen-lockfile=false --ignore-scripts || pnpm install --ignore-scripts

        echo "[Frontend] Installing src deps..."
        pnpm --dir src install --frozen-lockfile=false --ignore-scripts || pnpm --dir src install --ignore-scripts

        echo "[Frontend] Starting Vite dev server..."
        cd /app/src
        exec pnpm exec vite dev --host 0.0.0.0 --port 5173

  e2e:
    image: mcr.microsoft.com/playwright:v1.56.1-jammy
    working_dir: /work
    environment:
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PNPM_HOME: /pnpm
      PNPM_STORE_DIR: /work/.pnpm-store
      PW_BASE_URL: http://frontend:5173
    shm_size: "2gb"
    volumes:
      - ./:/work
      - e2e_frontend_src_node_modules:/work/frontend/src/node_modules
      - e2e_pnpm_store:/work/.pnpm-store
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -e
        if ! command -v pnpm >/dev/null 2>&1; then
          corepack enable
          corepack prepare pnpm@9.12.1 --activate
        fi
        if [ ! -d /work/frontend/src/node_modules ] || [ -z "$(ls -A /work/frontend/src/node_modules 2>/dev/null)" ]; then
          pnpm --dir /work/frontend/src install --no-lockfile
        fi
        exec "$0" "$@"

volumes:
  pg_data:
  neo4j_data:
  hf_cache:
  codexify_models:
    name: codexify_models
  model_store:
    driver: local
  e2e_frontend_src_node_modules:
  e2e_pnpm_store:
  corepack_cache:
  frontend_pnpm_store:
  codexify_cli_home:
