[pytest]
addopts = -q --disable-warnings --ignore=archive/legacy --ignore=guardian/tests
testpaths = tests
filterwarnings =
    ignore:.*utcnow\(\) is deprecated.*:DeprecationWarning
    ignore:.*class-based `config` is deprecated.*:DeprecationWarning
    ignore:.*Valid config keys have changed in V2.*:UserWarning
    ignore:.*on_event is deprecated.*:DeprecationWarning
    ignore:.*_multiarray_umath.*:DeprecationWarning
    ignore:.*SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:.*SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:.*swigvarlink has no __module__ attribute:DeprecationWarning
